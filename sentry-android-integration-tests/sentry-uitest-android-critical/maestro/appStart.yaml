appId: io.sentry.uitest.android.critical
name: App Start Tests
---
# Test 1: A fresh start is considered a cold start
- launchApp:
    stopApp: false
- assertVisible: "Welcome!"
- assertVisible: "App Start Type: COLD"

# Test 2: Background/foreground transition (WARM start)
- launchApp:
    stopApp: false
- assertVisible: "Welcome!"
- tapOn: "Finish Activity"
- launchApp:
    stopApp: false
- assertVisible: "App Start Type: WARM"

# Test 3: Notification (WARM start)
- launchApp:
    stopApp: true
    permissions:
      all: allow
- assertVisible: "Welcome!"
- tapOn: "Trigger Notification"
# Grant notification permission if the system dialog appears
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- tapOn: "Finish Activity"
- assertNotVisible: "Welcome!"
- waitForAnimationToEnd
- repeat:
    times: 5
    while:
      notVisible: "Sentry Test Notification"
    commands:
      - swipe:
          start: 50%, 1%
          end: 50%, 50%
          duration: 1000
      - waitForAnimationToEnd
- tapOn: "Sentry Test Notification"
- assertVisible: "App Start Type: WARM"

# Test 4: Notification (COLD start)
- launchApp:
    stopApp: true
    permissions:
      all: allow
- assertVisible: "Welcome!"
- tapOn: "Trigger Notification"
# Grant notification permission if the system dialog appears
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- tapOn: "Finish Activity"
- assertNotVisible: "Welcome!"
- killApp
- waitForAnimationToEnd
- repeat:
    times: 5
    while:
      notVisible: "Sentry Test Notification"
    commands:
      - swipe:
          start: 50%, 1%
          end: 50%, 50%
          duration: 1000
      - waitForAnimationToEnd
- tapOn: "Sentry Test Notification"
- assertVisible: "App Start Type: COLD"
