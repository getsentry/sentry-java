appId: io.sentry.uitest.android.critical
name: App Start Tests
---
# Test 1: A fresh start is considered a cold start
- launchApp:
    stopApp: false
- assertVisible: "Welcome!"
- assertVisible: "App Start Type: COLD"

# Test 2: Background/foreground transition (WARM start)
- launchApp:
    stopApp: false
- assertVisible: "Welcome!"
- tapOn: "Finish Activity"
- launchApp:
    stopApp: false
- assertVisible: "App Start Type: WARM"

# Test 3: Notification (WARM start)
- launchApp:
    stopApp: true
    permissions:
      all: allow
- assertVisible: "Welcome!"
- tapOn: "Trigger Notification"
# Grant notification permission if the system dialog appears
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
- tapOn: "Finish Activity"
- assertNotVisible: "Welcome!"
- waitForAnimationToEnd
- repeat:
    times: 5
    while:
      notVisible: "App Start Type: WARM"
    commands:
      # Reset to home screen to collapse any open shade/quick settings
      - pressKey: back
      - pressKey: home
      - waitForAnimationToEnd
      # Half-screen swipe: long enough to open shade, short enough to avoid quick settings
      - swipe:
          start: 90%, 0%
          end: 90%, 50%
          duration: 2000
      # Tap immediately after swipe while shade is still open
      - tapOn:
          text: "Sentry Test Notification"
          optional: true
- assertVisible: "App Start Type: WARM"

# Test 4: Notification (COLD start)
- launchApp:
    stopApp: true
    permissions:
      all: allow
- assertVisible: "Welcome!"
- tapOn: "Trigger Notification"
# Grant notification permission if the system dialog appears
- runFlow:
    when:
      visible: "Allow"
    commands:
      - tapOn: "Allow"
# Use "Kill Process" button instead of killApp to avoid am force-stop
# which clears notifications on API 33+
- tapOn: "Kill Process"
- waitForAnimationToEnd
- repeat:
    times: 5
    while:
      notVisible: "App Start Type: COLD"
    commands:
      # Reset to home screen to collapse any open shade/quick settings
      - pressKey: back
      - pressKey: home
      - waitForAnimationToEnd
      # Half-screen swipe: long enough to open shade, short enough to avoid quick settings
      - swipe:
          start: 90%, 0%
          end: 90%, 50%
          duration: 2000
      # Tap immediately after swipe while shade is still open
      - tapOn:
          text: "Sentry Test Notification"
          optional: true
- assertVisible: "App Start Type: COLD"
