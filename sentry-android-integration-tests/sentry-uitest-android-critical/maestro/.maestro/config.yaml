platform:
  android:
    disableAnimations: true
onFlowStart:
  # Dismiss any ANR dialog (e.g. "Pixel Launcher isn't responding")
  - runFlow:
      when:
        visible: "Close app"
      commands:
        - tapOn: "Close app"
  # Close notification shade if left open from a previous test
  - pressKey: back
  - pressKey: home
