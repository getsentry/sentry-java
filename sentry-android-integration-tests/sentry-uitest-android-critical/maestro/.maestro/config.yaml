platform:
  android:
    disableAnimations: true
onFlowStart:
  # Dismiss any ANR dialog (e.g. "Pixel Launcher isn't responding")
  - runFlow:
      when:
        visible: "Close app"
      commands:
        - tapOn: "Close app"
  # Collapse notification shade if left open from a previous test
  - swipe:
      start: 50%, 50%
      end: 50%, 1%
      duration: 300
  - pressKey: home
